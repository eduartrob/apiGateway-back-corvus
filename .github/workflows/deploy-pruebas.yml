name: Deploy Pruebas

on:
  workflow_dispatch:

jobs:
  deploy-pruebas:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pruebas on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/corvus-pruebas
            for repo in *corvus; do
              if [ -d "$repo/.git" ]; then
                echo "Updating $repo to dev branch..."
                cd /home/corvus-pruebas/"$repo"
                git fetch --all || true
                git reset --hard origin/dev || git checkout dev || true
                git pull origin dev || true
              fi
            done
            cd /home/corvus-pruebas/orquestador-pruebas
            git fetch --all || true
            git reset --hard origin/dev || git checkout dev || true
            git pull origin dev || true
            cat << 'INNER_EOF' > /home/corvus-pruebas/orquestador-pruebas/docker-compose.override.yml
            version: '3.8'
            services:
              db:
                container_name: corvus_postgres_pruebas
                ports:
                  - "5434:5432"
              rabbitmq:
                container_name: corvus_rabbitmq_pruebas
                ports:
                  - "5673:5672"
                  - "15673:15672"
              api-gateway:
                container_name: corvus_api_gateway_pruebas
                ports:
                  - "3010:3000"
              auth-service:
                container_name: corvus_auth_service_pruebas
              notifications-service:
                container_name: corvus_notifications_service_pruebas
              clustering-integrator-service:
                container_name: corvus_clustering_integrator_pruebas
              clustering-subject-service:
                container_name: corvus_clustering_subject_pruebas
              clustering-students-service:
                container_name: corvus_clustering_students_pruebas
              ollama:
                container_name: corvus_ollama_pruebas
              llm-service:
                container_name: corvus_llm_service_pruebas
              admin-frontend:
                container_name: corvus_admin_frontend_pruebas
                ports:
                  - "8080:80"
                  - "8443:443"
            networks:
              corvus_network:
                name: corvus_network_pruebas
            INNER_EOF

            docker compose down || true
            docker compose up -d --build
