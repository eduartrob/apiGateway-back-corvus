name: Deploy Pruebas

on:
  workflow_dispatch:

jobs:
  deploy-pruebas:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pruebas on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Actualizar todos los repos de pruebas a la rama dev
            for repo in /home/corvus-pruebas/*; do
              if [ -d "$repo/.git" ]; then
                echo "==> Actualizando $(basename $repo) a dev..."
                cd "$repo"
                git fetch --all || true
                git checkout dev 2>/dev/null || git checkout -b dev origin/dev 2>/dev/null || true
                git pull origin dev || true
              fi
            done

            # 2. Actualizar el orquestador de pruebas a dev
            cd /home/corvus-pruebas/orquestador-pruebas
            git fetch --all || true
            git checkout dev 2>/dev/null || git checkout -b dev origin/dev 2>/dev/null || true
            git pull origin dev || true

            # 3. Restaurar docker-compose.yml limpio antes de parcharlo
            git checkout docker-compose.yml

            # 4. Parcharlo en el servidor: agregar sufijo -pruebas a todos los container_name
            sed -i 's/\(container_name: .*\)/\1-pruebas/' docker-compose.yml

            # 5. Limpiar contenedores y redes viejas de pruebas
            docker compose down --remove-orphans || true
            docker rm -f $(docker ps -aq --filter "name=pruebas") 2>/dev/null || true
            docker network prune -f || true

            # 6. Levantar entorno de pruebas
            docker compose up -d --build
