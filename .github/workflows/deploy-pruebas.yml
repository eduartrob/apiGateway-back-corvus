name: Deploy Pruebas

on:
  workflow_dispatch:

jobs:
  deploy-pruebas:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pruebas on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/corvus-pruebas
            for repo in *corvus; do
              if [ -d "$repo/.git" ]; then
                echo "Updating $repo to dev branch..."
                cd /home/corvus-pruebas/"$repo"
                git fetch --all || true
                git reset --hard origin/dev || git checkout dev || true
                git pull origin dev || true
              fi
            done
            cd /home/corvus-pruebas/orquestador-pruebas
            git fetch --all || true
            git reset --hard origin/dev || git checkout dev || true
            git pull origin dev || true
            docker compose down || true
            docker compose up -d --build
