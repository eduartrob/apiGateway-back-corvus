name: Explore Server

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Explore Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Home directory:"
            ls -la /home/corvus
            echo "Looking for test environments..."
            find /home/corvus -maxdepth 2 -type d -name "*test*" || true
