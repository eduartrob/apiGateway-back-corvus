name: Ls Pruebas

on:
  workflow_dispatch:

jobs:
  ls-pruebas:
    runs-on: ubuntu-latest
    steps:
      - name: Ls Pruebas on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            ls -la /home/corvus-pruebas || true
            find /home/corvus-pruebas -name "docker-compose.yml" -maxdepth 3 || true
